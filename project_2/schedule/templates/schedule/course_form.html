{% extends 'schedule/base.html' %}

{% block title %}{% if course %}Редактировать{% else %}Создать{% endif %} курс{% endblock %}

{% block content %}
<h2>{% if course %}✏️ Редактирование курса{% else %}➕ Создание курса{% endif %}</h2>

<form method="post">
    {% csrf_token %}
    
    <div class="card">
        <h3>Информация о курсе</h3>
        <div class="form-group">
            <label>Название курса *</label>
            <input type="text" name="name" value="{{ course.name|default:'' }}" required>
        </div>
        <div class="form-group">
            <label>Описание *</label>
            <textarea name="description" rows="5" required>{{ course.description|default:'' }}</textarea>
        </div>
        <div class="form-group">
            <label>Уровень *</label>
            <select name="level" required>
                <option value="beginner" {% if course.level == 'beginner' %}selected{% endif %}>Начальный</option>
                <option value="intermediate" {% if course.level == 'intermediate' %}selected{% endif %}>Средний</option>
                <option value="advanced" {% if course.level == 'advanced' %}selected{% endif %}>Продвинутый</option>
            </select>
        </div>
        <div class="form-group">
            <label>Преподаватель</label>
            <select name="teacher_id">
                <option value="">-- Выберите преподавателя --</option>
                {% for teacher in teachers %}
                <option value="{{ teacher.id }}" {% if course.teacher.id == teacher.id %}selected{% endif %}>
                    {{ teacher.full_name }} ({{ teacher.get_level_display }})
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Длительность (недель) *</label>
            <input type="number" name="duration_weeks" value="{{ course.duration_weeks|default:'' }}" required>
        </div>
        <div class="form-group">
            <label>Цена (₽) *</label>
            <input type="number" step="0.01" name="price" value="{{ course.price|default:'0' }}" required>
        </div>
        <div class="form-group">
            <label>Дата старта *</label>
            <input type="date" name="start_date" value="{{ course.start_date|date:'Y-m-d'|default:'' }}" required>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_published" {% if course.is_published or not course %}checked{% endif %}>
                Опубликован
            </label>
        </div>
    </div>
    
    <button type="submit" class="btn btn-primary">💾 Сохранить</button>
    <a href="{% url 'schedule:course_index' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
