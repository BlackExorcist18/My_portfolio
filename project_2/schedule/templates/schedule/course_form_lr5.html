{% extends 'schedule/base.html' %}

{% block title %}Добавить курс (ModelForm){% endblock %}

{% block content %}
<h2>➕ Добавить курс</h2>

<form method="post">
    {% csrf_token %}
    
    <div class="card">
        <h3>Информация о курсе</h3>
        {{ form.as_p }}
    </div>
    
    <button type="submit" class="btn btn-primary">💾 Сохранить</button>
    <a href="{% url 'schedule:course_index' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
