{% extends 'schedule/base.html' %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2>🔐 Восстановление пароля</h2>
    <p>Забыли пароль? Введите ваш email, и мы отправим инструкцию для восстановления.</p>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">📧 Отправить инструкцию</button>
    </form>
    
    <p style="margin-top: 15px;">
        <a href="{% url 'users:login' %}">Вернуться ко входу</a>
    </p>
</div>
{% endblock %}
